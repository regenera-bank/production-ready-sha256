name: design-system-verification

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Runtime
        run: node --version
      - name: Install lockfile
        run: npm ci --ignore-scripts
      - name: Verify package
        run: npm run all
