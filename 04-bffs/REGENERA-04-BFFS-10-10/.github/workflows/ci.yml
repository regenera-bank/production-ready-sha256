name: bff-quality-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Runtime versions
        run: |
          node --version
          python3 --version
          make --version | head -1
      - name: Verify
        run: make all
