<h1>Runbook — Link Quebrado</h1>

<p>1. Bloqueie a release.</p>
<p>2. Identifique origem e destino.</p>
<p>3. Corrija o link ou retire a referência obsoleta.</p>
<p>4. Execute validação completa.</p>
<p>5. Registre a causa se o destino foi removido sem depreciação.</p></main></body></html>
