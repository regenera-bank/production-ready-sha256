<h1>Runbook — Mudança Documental Emergencial</h1>

<p>1. Registre incidente ou mudança emergencial.</p>
<p>2. Limite o escopo.</p>
<p>3. Preserve o conteúdo anterior.</p>
<p>4. Exija revisão independente posterior com prazo definido.</p>
<p>5. Não use urgência para inventar aprovação, protocolo ou evidência.</p></main></body></html>
