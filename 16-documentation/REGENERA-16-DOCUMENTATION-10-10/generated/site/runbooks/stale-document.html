<h1>Runbook — Documento Vencido</h1>

<p>1. Marque o documento como não confiável para decisão nova.</p>
<p>2. Notifique owner e reviewers.</p>
<p>3. Revalide conteúdo e dependências.</p>
<p>4. Atualize revisão ou altere estado para `SUPERSEDED`/`RETIRED`.</p>
<p>5. Execute `make all`.</p></main></body></html>
