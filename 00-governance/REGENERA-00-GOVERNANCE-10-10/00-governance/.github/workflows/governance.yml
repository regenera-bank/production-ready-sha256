name: governance-controls

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Verify governance package
        working-directory: 00-governance
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: make all
