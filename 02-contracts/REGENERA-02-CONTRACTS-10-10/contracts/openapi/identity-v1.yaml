openapi: 3.1.0
info:
  title: Regenera Identity API
  version: 1.0.0
  description: Sessão, rotação e revogação. Refresh token reutilizado derruba a família.
servers:
- url: https://api.regenera.invalid/v1
  description: Valor deliberadamente não roteável. O ambiente define o endpoint real.
security:
- oauth2: []
paths:
  /identity/sessions:
    post:
      operationId: openSession
      security: []
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenSessionRequest'
      responses:
        '201':
          description: Sessão aberta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/BadRequest'
  /identity/sessions/{sessionId}:
    delete:
      operationId: revokeSession
      security:
      - oauth2:
        - banking:write
      parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Sessão revogada ou já encerrada.
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://identity.regenera.invalid/oauth2/authorize
          tokenUrl: https://identity.regenera.invalid/oauth2/token
          scopes:
            banking:read: Consulta dados financeiros.
            banking:write: Inicia operações financeiras.
  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Rastro único da operação.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
      description: Mesma intenção, mesma chave. Conteúdo diferente com a mesma chave
        é conflito.
  schemas:
    Problem:
      type: object
      required:
      - code
      - message
      - correlationId
      - retryable
      properties:
        code:
          type: string
          pattern: ^RG-[A-Z0-9-]{3,64}$
        message:
          type: string
          minLength: 1
          maxLength: 300
        correlationId:
          type: string
          format: uuid
        retryable:
          type: boolean
        details:
          type: object
          additionalProperties: true
      additionalProperties: false
    Money:
      $schema: https://json-schema.org/draft/2020-12/schema
      $id: urn:regenera:schema:money:1
      title: Money
      type: object
      required:
      - currency
      - amountCents
      properties:
        currency:
          type: string
          const: BRL
        amountCents:
          type: string
          pattern: ^-?(0|[1-9][0-9]{0,18})$
      additionalProperties: false
    OpenSessionRequest:
      type: object
      required:
      - deviceFingerprint
      - platform
      properties:
        deviceFingerprint:
          type: string
          minLength: 32
          maxLength: 256
        platform:
          enum:
          - WEB
          - IOS
          - ANDROID
      additionalProperties: false
    Session:
      type: object
      required:
      - sessionId
      - familyId
      - status
      - expiresAt
      properties:
        sessionId:
          type: string
          format: uuid
        familyId:
          type: string
          format: uuid
        status:
          enum:
          - ACTIVE
          - ROTATED
          - REVOKED
          - EXPIRED
        expiresAt:
          type: string
          format: date-time
      additionalProperties: false
  responses:
    BadRequest:
      description: Contrato inválido.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Conflito de idempotência ou estado.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unknown:
      description: Resultado ainda não confirmado. Não repetir cegamente.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
