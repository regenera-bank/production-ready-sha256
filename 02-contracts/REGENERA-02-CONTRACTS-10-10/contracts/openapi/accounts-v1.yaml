openapi: 3.1.0
info:
  title: Regenera Accounts API
  version: 1.0.0
  description: Consulta de conta e saldos. Saldo exibido não substitui o ledger.
servers:
- url: https://api.regenera.invalid/v1
  description: Valor deliberadamente não roteável. O ambiente define o endpoint real.
security:
- oauth2: []
paths:
  /accounts/{accountId}:
    get:
      operationId: getAccount
      summary: Consulta uma conta.
      security:
      - oauth2:
        - banking:read
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Conta encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Conta não encontrada.
  /accounts/{accountId}/balances:
    get:
      operationId: getAccountBalances
      summary: Consulta saldos contábil e disponível.
      security:
      - oauth2:
        - banking:read
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Saldos encontrados.
          content:
            application/json:
              schema:
                type: object
                required:
                - ledgerBalance
                - availableBalance
                - asOf
                properties:
                  ledgerBalance:
                    $ref: '#/components/schemas/Money'
                  availableBalance:
                    $ref: '#/components/schemas/Money'
                  asOf:
                    type: string
                    format: date-time
                additionalProperties: false
        '400':
          $ref: '#/components/responses/BadRequest'
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://identity.regenera.invalid/oauth2/authorize
          tokenUrl: https://identity.regenera.invalid/oauth2/token
          scopes:
            banking:read: Consulta dados financeiros.
            banking:write: Inicia operações financeiras.
  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Rastro único da operação.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
      description: Mesma intenção, mesma chave. Conteúdo diferente com a mesma chave
        é conflito.
  schemas:
    Problem:
      type: object
      required:
      - code
      - message
      - correlationId
      - retryable
      properties:
        code:
          type: string
          pattern: ^RG-[A-Z0-9-]{3,64}$
        message:
          type: string
          minLength: 1
          maxLength: 300
        correlationId:
          type: string
          format: uuid
        retryable:
          type: boolean
        details:
          type: object
          additionalProperties: true
      additionalProperties: false
    Money:
      $schema: https://json-schema.org/draft/2020-12/schema
      $id: urn:regenera:schema:money:1
      title: Money
      type: object
      required:
      - currency
      - amountCents
      properties:
        currency:
          type: string
          const: BRL
        amountCents:
          type: string
          pattern: ^-?(0|[1-9][0-9]{0,18})$
      additionalProperties: false
    Account:
      title: Account
      type: object
      required:
      - accountId
      - status
      - currency
      - availableBalance
      - ledgerBalance
      - version
      properties:
        accountId:
          type: string
          format: uuid
        status:
          enum:
          - PENDING
          - ACTIVE
          - BLOCKED
          - CLOSED
        currency:
          const: BRL
        availableBalance:
          $ref: money.schema.json
        ledgerBalance:
          $ref: money.schema.json
        version:
          type: integer
          minimum: 0
      additionalProperties: false
  responses:
    BadRequest:
      description: Contrato inválido.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Conflito de idempotência ou estado.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unknown:
      description: Resultado ainda não confirmado. Não repetir cegamente.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
